<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada | Especialistas en Drones</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    
    <link rel="icon" type="image/svg+xml" href="media/favicon.svg">
</head>

<body style="display: flex; flex-direction: column; min-height: 100vh; background: var(--bg-main);">

    <nav style="background: rgba(0, 0, 0, 0.85); border-bottom: 1px solid var(--border); padding: 15px 5%; position: relative;">
        <a href="/" class="logo">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="12 2 2 12 12 22 22 12 12 2"></polygon>
                <circle cx="12" cy="12" r="3"></circle>
            </svg>
            Especialistas en Drones
        </a>
    </nav>

    <main style="flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 10%;">
        
        <h1 style="font-size: clamp(6rem, 15vw, 10rem); font-weight: 600; color: var(--accent-blue); margin-bottom: 0; line-height: 1;">404</h1>
        <h2 style="font-size: 2.5rem; margin-bottom: 20px; color: var(--text-main);">¡Señal GPS Perdida!</h2>
        
        <p style="font-size: 1.15rem; color: var(--text-muted); max-width: 600px; margin-bottom: 40px; line-height: 1.6;">
            Parece que nuestro dron se desvió de su ruta de vuelo planificada. La página que buscas no existe o ha sido movida a otras coordenadas geoespaciales.
        </p>
        
        <a href="/" class="btn-submit" style="text-decoration: none; display: inline-block; max-width: 300px; text-align: center;">
            Retornar a la Base (Inicio)
        </a>
        
    </main>
